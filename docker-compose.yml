version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile_inline: |
        FROM node:20-alpine
        WORKDIR /app
        COPY package*.json ./
        RUN npm ci --omit=dev
        COPY src ./src
        EXPOSE 4000
        CMD ["node", "src/index.js"]
    container_name: keyone-api
    restart: unless-stopped
    env_file: ./backend/.env
    ports:
      - "4000:4000"
    volumes:
      - ./backend/data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile_inline: |
        FROM node:20-alpine AS build
        WORKDIR /app
        COPY package*.json ./
        RUN npm ci
        COPY . .
        ARG NEXT_PUBLIC_API_URL
        ENV NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL
        RUN npm run build
        FROM node:20-alpine
        WORKDIR /app
        COPY --from=build /app/.next ./.next
        COPY --from=build /app/public ./public
        COPY --from=build /app/package*.json ./
        COPY --from=build /app/node_modules ./node_modules
        EXPOSE 3000
        CMD ["npm", "start"]
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    container_name: keyone-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
